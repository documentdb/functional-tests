# Development database targets for the functional test suite.
#
# Each service is an engine-topology target the tests can run against. A target
# names both the engine and its deployment topology (e.g. standalone, replset),
# because topology is an engine-specific concept and does not map cleanly across
# engines. Bring up a single target with its profile, or the whole stack with
# the "all" profile, e.g.:
#
#   docker compose -f dev/compose.yaml --profile mongo-standalone up -d --wait
#   docker compose -f dev/compose.yaml --profile mongo-replset    up -d --wait
#   docker compose -f dev/compose.yaml --profile all              up -d --wait
#
# Each target binds a distinct host port (see the ports: mapping below) so
# several can run at once locally; the same ports are used in CI for
# consistency. See the README for the canonical connection string per target.
#
# This file is the single source of truth for these topologies: CI brings them
# up from here rather than declaring containers separately, so local runs match
# CI by construction. It is also the source of truth for the test harness: each
# runnable target carries an `x-test-target` block that the test registry reads
# to build its connection string and engine identity (see
# documentdb_tests/framework/engine_registry.py). The host port comes from the
# `ports:` mapping, so nothing is duplicated.
#
#   x-test-target:
#     engine: <engine name used for engine_xfail / engine_xcrash markers>
#     query: <optional connection-string query string, without leading '?'>
#
# A service with no `x-test-target` is not a test target and is ignored by the
# registry (e.g. the mongot sidecar, which is reached only through its mongod).
#
# Memory: each mongod caps its WiredTiger cache (--wiredTigerCacheSizeGB). By
# default a mongod sizes its cache to ~50% of the host/VM RAM; with several
# targets running at once that double-counts memory and the whole suite (which
# creates many collections across both targets) gradually fills both caches
# until the VM is exhausted and a container is OOM-killed mid-run. Capping the
# cache keeps the combined footprint within the VM. There is intentionally no
# per-container mem_limit: that caps total process memory (not just cache) and a
# transient working-set spike then kills mongod even when the VM has room.

services:
  # mongo-standalone: a single standalone server.
  mongo-standalone:
    image: mongo:8.2.4
    profiles: ["mongo-standalone", "all"]
    command: ["--wiredTigerCacheSizeGB", "1.5"]
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    x-test-target:
      engine: mongodb

  # mongo-replset: a single-node replica set. Provides capabilities the
  # reference server gates behind a replica set (change streams, transactions,
  # queryable encryption, cluster-wide admin). Connect with directConnection=true.
  mongo-replset:
    image: mongo:8.2.4
    profiles: ["mongo-replset", "all"]
    command:
      - "--replSet"
      - "rs0"
      - "--bind_ip_all"
      - "--wiredTigerCacheSizeGB"
      - "1.5"
      # Point at the mongot search sidecar so this replica set also serves the
      # search surfaces. mongot is transparent to all other behavior, so the
      # set behaves identically to a plain replica set apart from gaining
      # search; it is one target, not two.
      - "--setParameter"
      - "mongotHost=mongot:27028"
      - "--setParameter"
      - "searchIndexManagementHostAndPort=mongot:27028"
      - "--setParameter"
      - "useGrpcForSearch=true"
      - "--setParameter"
      - "skipAuthenticationToMongot=true"
      - "--setParameter"
      - "skipAuthenticationToSearchIndexManagementServer=true"
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    x-test-target:
      engine: mongodb
      query: directConnection=true

  # mongot: the search sidecar for the mongo-replset target. Not a test target
  # on its own; the suite reaches it only through mongo-replset. mongot is
  # MongoDB Search Community Edition (SSPL, same license as the server). It
  # replicates from the replica set as an authenticated sync source and reads
  # its password from a file, so the entrypoint writes that file (a fixed
  # local-dev secret, matched by the searchCoordinator user the harness creates
  # on the replica set) with owner-only permissions before launching. It retries
  # the connection until that user exists.
  mongot:
    image: mongodb/mongodb-community-search:latest
    profiles: ["mongo-replset", "all"]
    entrypoint:
      - "sh"
      - "-c"
      - >
        umask 077 &&
        mkdir -p /mongot-secrets &&
        printf '%s' "$$MONGOT_SYNC_PASSWORD" > /mongot-secrets/passwordFile &&
        exec /mongot-community/mongot --config /mongot-config/mongot.yml
    environment:
      # Fixed local-dev secret shared with the searchCoordinator user the
      # harness provisions on mongo-replset. Not a real credential.
      MONGOT_SYNC_PASSWORD: "searchSyncPassword"
    volumes:
      - ./mongot.yml:/mongot-config/mongot.yml:ro
