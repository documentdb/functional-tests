name: PR Tests

on:
  pull_request:
    branches: [main]

jobs:
  test-mongodb:
    name: Tests (MongoDB)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8.2.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run compatibility tests against MongoDB
        run: |
          pytest documentdb_tests/compatibility/tests \
            --connection-string "mongodb://localhost:27017" \
            --engine-name mongodb \
            -n auto \
            -v \
            --json-report --json-report-file=${{ github.workspace }}/.test-results/mongodb-report.json \
            --junitxml=${{ github.workspace }}/.test-results/mongodb-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-mongodb
          include-hidden-files: true
          path: ${{ github.workspace }}/.test-results/
          if-no-files-found: warn

      - name: Generate test summary
        if: always()
        run: |
          if [ -f ${{ github.workspace }}/.test-results/mongodb-report.json ]; then
            python -m documentdb_tests.compatibility.result_analyzer -i ${{ github.workspace }}/.test-results/mongodb-report.json -o ${{ github.workspace }}/.test-results/mongodb-analysis.txt -f text || true
            echo "## MongoDB Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat ${{ github.workspace }}/.test-results/mongodb-analysis.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  test-mongodb-replica-set:
    name: Tests (MongoDB Replica Set)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8.2.4
        ports:
          - 27017:27017
        command: --replSet rs0
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Initialize replica set
        run: |
          docker exec "${{ job.services.mongodb.id }}" mongosh --eval '
            rs.initiate({_id: "rs0", members: [{_id: 0, host: "localhost:27017"}]})
          '
          # Wait for the primary to be elected
          sleep 3

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run replica set tests against MongoDB
        run: |
          pytest documentdb_tests/compatibility/tests \
            -m replica_set \
            --connection-string "mongodb://localhost:27017/?directConnection=true" \
            --engine-name mongodb \
            -n auto \
            -v \
            --json-report --json-report-file=${{ github.workspace }}/.test-results/replica-set-report.json \
            --junitxml=${{ github.workspace }}/.test-results/replica-set-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-replica-set
          include-hidden-files: true
          path: ${{ github.workspace }}/.test-results/
          if-no-files-found: warn

      - name: Generate test summary
        if: always()
        run: |
          if [ -f ${{ github.workspace }}/.test-results/replica-set-report.json ]; then
            python -m documentdb_tests.compatibility.result_analyzer -i ${{ github.workspace }}/.test-results/replica-set-report.json -o ${{ github.workspace }}/.test-results/replica-set-analysis.txt -f text || true
            echo "## MongoDB Replica Set Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat ${{ github.workspace }}/.test-results/replica-set-analysis.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  collect-xcrash:
    name: Collect crash tests
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.collect.outputs.tests }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect engine_xcrash test IDs
        id: collect
        run: |
          TESTS=$(pytest documentdb_tests/compatibility/tests \
            --connection-string mongodb://localhost:27017 \
            --engine-name mongodb \
            --collect-only -m engine_xcrash 2>/dev/null \
            | grep '<Function' \
            | sed 's/.*<Function \(.*\)>/\1/' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

  test-mongodb-xcrash:
    name: "Crash Test: ${{ matrix.test }}"
    needs: collect-xcrash
    if: needs.collect-xcrash.outputs.tests != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.collect-xcrash.outputs.tests) }}

    services:
      mongodb:
        image: mongo:8.2.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Run: ${{ matrix.test }}"
        run: |
          # Run the test expecting it to crash the server (non-zero exit).
          # If pytest exits 0, the test passed - meaning the bug is fixed
          # and the engine_xcrash marker should be removed.
          if pytest documentdb_tests/compatibility/tests \
            -m engine_xcrash -k "${{ matrix.test }}" \
            --connection-string "mongodb://localhost:27017" \
            --engine-name mongodb-xcrash-probe \
            --timeout=10 -v; then
            echo "::error::Test passed unexpectedly - server bug may be fixed, remove engine_xcrash marker"
            exit 1
          fi
