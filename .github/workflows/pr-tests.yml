name: PR Tests

on:
  pull_request:
    branches: [main]

jobs:
  # Derive the test matrix from dev/compose.yaml so targets are declared in one
  # place. Each entry has the target name, its compose profile, connection
  # string, and engine name.
  discover-targets:
    name: Discover test targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build target matrix from compose
        id: matrix
        run: |
          TARGETS=$(python -m documentdb_tests.framework.ci_matrix)
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"

  test:
    name: "Tests (${{ matrix.target.name }})"
    needs: discover-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-targets.outputs.targets) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start ${{ matrix.target.name }} target
        run: docker compose -f dev/compose.yaml --profile ${{ matrix.target.profile }} up -d --wait

      - name: Run compatibility tests against ${{ matrix.target.name }}
        run: |
          pytest documentdb_tests/compatibility/tests \
            --connection-string "${{ matrix.target.connection_string }}" \
            --engine-name "${{ matrix.target.engine }}" \
            -n auto \
            -v \
            --json-report --json-report-file=${{ github.workspace }}/.test-results/${{ matrix.target.name }}-report.json \
            --junitxml=${{ github.workspace }}/.test-results/${{ matrix.target.name }}-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.target.name }}
          include-hidden-files: true
          path: ${{ github.workspace }}/.test-results/
          if-no-files-found: warn

      - name: Generate test summary
        if: always()
        run: |
          REPORT=${{ github.workspace }}/.test-results/${{ matrix.target.name }}-report.json
          ANALYSIS=${{ github.workspace }}/.test-results/${{ matrix.target.name }}-analysis.txt
          if [ -f "$REPORT" ]; then
            python -m documentdb_tests.compatibility.result_analyzer -i "$REPORT" -o "$ANALYSIS" -f text || true
            echo "## ${{ matrix.target.name }} Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "$ANALYSIS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # Crash tests kill the server, so each runs in isolation in its own job (one
  # job per target/test pair, each starting its own server). They run against
  # every target; the per-test requires(...) markers skip those that do not
  # apply to a target's topology, just as in the main suite.
  discover-xcrash:
    name: Collect crash tests
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.collect.outputs.tests }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect engine_xcrash test IDs
        id: collect
        run: |
          # Collection only reads test files, so no database is needed. Running
          # it as its own command lets a collection failure fail the job (the
          # shell runs with -e). The output is then parsed for crash-test IDs;
          # zero matches means there are no crash tests, which is valid.
          pytest documentdb_tests/compatibility/tests \
            --collect-only -m engine_xcrash > collect.out
          TESTS=$(grep '<Function' collect.out \
            | sed 's/.*<Function \(.*\)>/\1/' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

  test-xcrash:
    name: "Crash Test: ${{ matrix.target.name }} / ${{ matrix.test }}"
    needs: [discover-targets, discover-xcrash]
    if: needs.discover-xcrash.outputs.tests != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-targets.outputs.targets) }}
        test: ${{ fromJson(needs.discover-xcrash.outputs.tests) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start ${{ matrix.target.name }} target
        run: docker compose -f dev/compose.yaml --profile ${{ matrix.target.profile }} up -d --wait

      - name: "Run: ${{ matrix.test }} against ${{ matrix.target.name }}"
        run: |
          # --run-crash-tests lets the test execute against the engine it
          # crashes (it is skipped by default). The real engine name is used so
          # the requires(...) markers gate it by topology.
          #
          # Three outcomes, only the last is a failure:
          #   - pytest exits non-zero: the server crashed (expected) -> success.
          #   - pytest exits 0 but the test was skipped: it does not apply to
          #     this target's topology -> success.
          #   - pytest exits 0 and the test ran and passed: the server no longer
          #     crashes -> the bug is fixed and the engine_xcrash marker should
          #     be removed -> fail the job.
          if pytest documentdb_tests/compatibility/tests \
            -m engine_xcrash -k "${{ matrix.test }}" \
            --run-crash-tests \
            --connection-string "${{ matrix.target.connection_string }}" \
            --engine-name "${{ matrix.target.engine }}" \
            --junitxml=crash-result.xml \
            --timeout=10 -v; then
            if grep -q '<skipped' crash-result.xml; then
              echo "Skipped on ${{ matrix.target.name }}: does not apply to this topology."
            else
              echo "::error::Test passed unexpectedly on ${{ matrix.target.name }} - server bug may be fixed, remove engine_xcrash marker"
              exit 1
            fi
          fi
