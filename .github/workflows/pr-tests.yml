name: PR Tests

on:
  pull_request:
    branches: [main]

jobs:
  test-mongo-standalone:
    name: Tests (mongo-standalone)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start mongo-standalone target
        run: docker compose -f dev/compose.yaml --profile mongo-standalone up -d --wait

      - name: Run compatibility tests against mongo-standalone
        run: |
          pytest documentdb_tests/compatibility/tests \
            --connection-string "mongodb://localhost:27017" \
            --engine-name mongodb \
            -n auto \
            -v \
            --json-report --json-report-file=${{ github.workspace }}/.test-results/mongo-standalone-report.json \
            --junitxml=${{ github.workspace }}/.test-results/mongo-standalone-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-mongo-standalone
          include-hidden-files: true
          path: ${{ github.workspace }}/.test-results/
          if-no-files-found: warn

      - name: Generate test summary
        if: always()
        run: |
          if [ -f ${{ github.workspace }}/.test-results/mongo-standalone-report.json ]; then
            python -m documentdb_tests.compatibility.result_analyzer -i ${{ github.workspace }}/.test-results/mongo-standalone-report.json -o ${{ github.workspace }}/.test-results/mongo-standalone-analysis.txt -f text || true
            echo "## mongo-standalone Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat ${{ github.workspace }}/.test-results/mongo-standalone-analysis.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  test-mongo-replset:
    name: Tests (mongo-replset)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start mongo-replset target
        run: docker compose -f dev/compose.yaml --profile mongo-replset up -d --wait

      - name: Run capability tests against mongo-replset
        run: |
          pytest documentdb_tests/compatibility/tests \
            -m "requires_change_streams or requires_transactions or requires_queryable_encryption or requires_cluster_admin" \
            --connection-string "mongodb://localhost:27018/?directConnection=true" \
            --engine-name mongodb \
            -n auto \
            -v \
            --json-report --json-report-file=${{ github.workspace }}/.test-results/mongo-replset-report.json \
            --junitxml=${{ github.workspace }}/.test-results/mongo-replset-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-mongo-replset
          include-hidden-files: true
          path: ${{ github.workspace }}/.test-results/
          if-no-files-found: warn

      - name: Generate test summary
        if: always()
        run: |
          if [ -f ${{ github.workspace }}/.test-results/mongo-replset-report.json ]; then
            python -m documentdb_tests.compatibility.result_analyzer -i ${{ github.workspace }}/.test-results/mongo-replset-report.json -o ${{ github.workspace }}/.test-results/mongo-replset-analysis.txt -f text || true
            echo "## mongo-replset Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat ${{ github.workspace }}/.test-results/mongo-replset-analysis.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  collect-xcrash:
    name: Collect crash tests
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.collect.outputs.tests }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect engine_xcrash test IDs
        id: collect
        run: |
          TESTS=$(pytest documentdb_tests/compatibility/tests \
            --connection-string mongodb://localhost:27017 \
            --engine-name mongodb \
            --collect-only -m engine_xcrash 2>/dev/null \
            | grep '<Function' \
            | sed 's/.*<Function \(.*\)>/\1/' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

  test-mongo-xcrash:
    name: "Crash Test: ${{ matrix.test }}"
    needs: collect-xcrash
    if: needs.collect-xcrash.outputs.tests != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.collect-xcrash.outputs.tests) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start mongo-standalone target
        run: docker compose -f dev/compose.yaml --profile mongo-standalone up -d --wait

      - name: "Run: ${{ matrix.test }}"
        run: |
          # Run the test expecting it to crash the server (non-zero exit).
          # If pytest exits 0, the test passed - meaning the bug is fixed
          # and the engine_xcrash marker should be removed.
          if pytest documentdb_tests/compatibility/tests \
            -m engine_xcrash -k "${{ matrix.test }}" \
            --connection-string "mongodb://localhost:27017" \
            --engine-name mongodb-xcrash-probe \
            --timeout=10 -v; then
            echo "::error::Test passed unexpectedly - server bug may be fixed, remove engine_xcrash marker"
            exit 1
          fi
