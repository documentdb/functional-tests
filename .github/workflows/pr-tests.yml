name: PR Tests

on:
  pull_request:
    branches: [main]

jobs:
  # Derive the test matrix from dev/compose.yaml so targets are declared in one
  # place. Each entry has the target name, its compose profile, connection
  # string, and engine name.
  discover-targets:
    name: Discover test targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.matrix.outputs.targets }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build target matrix from compose
        id: matrix
        run: |
          TARGETS=$(python -m documentdb_tests.framework.ci_matrix)
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"

  test:
    name: "Tests (${{ matrix.target.name }})"
    needs: discover-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover-targets.outputs.targets) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start ${{ matrix.target.name }} target
        run: docker compose -f dev/compose.yaml --profile ${{ matrix.target.profile }} up -d --wait

      - name: Run compatibility tests against ${{ matrix.target.name }}
        run: |
          pytest documentdb_tests/compatibility/tests \
            --connection-string "${{ matrix.target.connection_string }}" \
            --engine-name "${{ matrix.target.engine }}" \
            -n auto \
            -v \
            --json-report --json-report-file=${{ github.workspace }}/.test-results/${{ matrix.target.name }}-report.json \
            --junitxml=${{ github.workspace }}/.test-results/${{ matrix.target.name }}-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.target.name }}
          include-hidden-files: true
          path: ${{ github.workspace }}/.test-results/
          if-no-files-found: warn

      - name: Generate test summary
        if: always()
        run: |
          REPORT=${{ github.workspace }}/.test-results/${{ matrix.target.name }}-report.json
          ANALYSIS=${{ github.workspace }}/.test-results/${{ matrix.target.name }}-analysis.txt
          if [ -f "$REPORT" ]; then
            python -m documentdb_tests.compatibility.result_analyzer -i "$REPORT" -o "$ANALYSIS" -f text || true
            echo "## ${{ matrix.target.name }} Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "$ANALYSIS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # Crash tests kill the server, so each runs in isolation in its own job. They
  # are engine-dependent (gated by engine_xcrash(engine=...)) and not topology-
  # dependent, so the probe runs once per distinct engine rather than per target.
  discover-xcrash:
    name: Collect crash tests
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.collect.outputs.tests }}
      engines: ${{ steps.engines.outputs.engines }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build engine matrix from compose
        id: engines
        run: |
          ENGINES=$(python -m documentdb_tests.framework.ci_matrix engines)
          echo "engines=$ENGINES" >> "$GITHUB_OUTPUT"

      - name: Collect engine_xcrash test IDs
        id: collect
        run: |
          # Collection only reads test files, so no database is needed. Running
          # it as its own command lets a collection failure fail the job (the
          # shell runs with -e). The output is then parsed for crash-test IDs;
          # zero matches means there are no crash tests, which is valid.
          pytest documentdb_tests/compatibility/tests \
            --collect-only -m engine_xcrash > collect.out
          TESTS=$(grep '<Function' collect.out \
            | sed 's/.*<Function \(.*\)>/\1/' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

  test-xcrash:
    name: "Crash Test: ${{ matrix.engine.engine }} / ${{ matrix.test }}"
    needs: discover-xcrash
    if: needs.discover-xcrash.outputs.tests != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: ${{ fromJson(needs.discover-xcrash.outputs.engines) }}
        test: ${{ fromJson(needs.discover-xcrash.outputs.tests) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start a ${{ matrix.engine.engine }} server
        run: docker compose -f dev/compose.yaml --profile ${{ matrix.engine.profile }} up -d --wait

      - name: "Run: ${{ matrix.test }} against ${{ matrix.engine.engine }}"
        run: |
          # Run the test with a probe engine name that does NOT match the
          # engine_xcrash marker, so the harness does not skip it and the test
          # actually executes. It is expected to crash the server (non-zero
          # exit), which is success. If pytest exits 0 the test passed - the bug
          # is fixed and the engine_xcrash marker should be removed.
          if pytest documentdb_tests/compatibility/tests \
            -m engine_xcrash -k "${{ matrix.test }}" \
            --connection-string "${{ matrix.engine.connection_string }}" \
            --engine-name "${{ matrix.engine.engine }}-xcrash-probe" \
            --timeout=10 -v; then
            echo "::error::Test passed unexpectedly on ${{ matrix.engine.engine }} - server bug may be fixed, remove engine_xcrash marker"
            exit 1
          fi
